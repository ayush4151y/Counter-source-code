name: GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version name for the release (e.g. v1.2.0)'
        required: true
      body:
        description: 'Release description (use \n for new lines)'
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build release description
        id: desc
        env:
          BODY: ${{ github.event.inputs.body }}
        run: |
          {
            echo "body<<RELEASE_EOF"
            printf '%b' "$BODY"
            echo ""
            echo "RELEASE_EOF"
          } >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4.2.1
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;29.0.3"

      - name: Give permission to executable
        run: chmod +x gradlew

      - name: Clear build cache
        uses: gradle/gradle-build-action@v3.1.0
        with:
          gradle-version: wrapper
          arguments: clean

      - name: Build Fdroid Release APK
        run: ./gradlew assembleFdroidRelease

      - name: Sign Fdroid Variant APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_app_fdroid
        with:
          releaseDirectory: app/build/outputs/apk/fdroid/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename signed APK
        id: apk
        run: |
          SRC="${{ steps.sign_app_fdroid.outputs.signedReleaseFile }}"
          DEST="curbox-${{ steps.tag.outputs.name }}-fdroid.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body: ${{ steps.desc.outputs.body }}
          draft: false
          prerelease: false
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
