name: Release CI

on:
  push:
    branches: [ "kt-rewrite" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4.2.1
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;29.0.3"

      - name: Give permission to executable
        run: chmod +x gradlew

      - name: Clear build cache
        uses: gradle/gradle-build-action@v3.1.0
        with:
          gradle-version: wrapper
          arguments: clean

      - name: Build Fdroid Release APK
        run: ./gradlew assembleFdroidRelease

      - name: Sign Fdroid Variant APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_app_fdroid
        with:
          releaseDirectory: app/build/outputs/apk/fdroid/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Get APK Info
        id: apk_info
        run: |
          APK_PATH=${{ steps.sign_app_fdroid.outputs.signedReleaseFile }}
          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          
          # Extract commit variables safely for later steps
          COMMIT_MESSAGE=$(git log -1 --pretty=format:%s)
          COMMIT_AUTHOR=$(git log -1 --pretty=format:%an)
          
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "commit_message=$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
          echo "commit_author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT

      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v4
        id: vt
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: ${{ steps.apk_info.outputs.apk_path }}

      - name: Send Signed APK to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_BETA_WEBHOOK }}
          VT_ANALYSIS: ${{ steps.vt.outputs.analysis }}
        run: |
          APK_PATH=${{ steps.apk_info.outputs.apk_path }}
          APK_SIZE=${{ steps.apk_info.outputs.apk_size }}
          COMMIT_MESSAGE="${{ steps.apk_info.outputs.commit_message }}"
          COMMIT_AUTHOR="${{ steps.apk_info.outputs.commit_author }}"
          AUTHOR_URL="https://github.com/${{ github.actor }}"
          COMMIT_SHA=${{ github.sha }}
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/$COMMIT_SHA"
          
          # Extract VirusTotal scan URL (output format from the action is "filename=URL")
          VT_URL=$(echo "$VT_ANALYSIS" | cut -d'=' -f2-)
          
          # Format Discord message as JSON (with VirusTotal link added)
          MESSAGE=$(cat <<EOF
          {
            "embeds": [{
              "title": "New Beta Release",
              "description": "A new signed beta APK has been built, passed VirusTotal scan, and is ready for testing!",
              "color": 5814783,
              "fields": [
                {"name": "Size", "value": "$APK_SIZE", "inline": true},
                {"name": "Commit", "value": "[#$COMMIT_SHA]($COMMIT_URL)", "inline": false},
                {"name": "Message", "value": "$COMMIT_MESSAGE", "inline": false},
                {"name": "Author", "value": "[$COMMIT_AUTHOR]($AUTHOR_URL)", "inline": false},
                {"name": "VirusTotal", "value": "[View Full Scan Results]($VT_URL)", "inline": false}
              ],
              "footer": {"text": "Built with GitHub Actions"},
              "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            }],
            "attachments": []
          }
          EOF
          )
          
          # Upload APK and send message
          curl -X POST \
            -H "Content-Type: multipart/form-data" \
            -F "payload_json=$MESSAGE" \
            -F "file=@$APK_PATH" \
            "$DISCORD_WEBHOOK"

      - name: Send Signed APK to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VT_ANALYSIS: ${{ steps.vt.outputs.analysis }}
        run: |
          APK_PATH=${{ steps.apk_info.outputs.apk_path }}
          COMMIT_SHA=${{ github.sha }}
          COMMIT_MESSAGE="${{ steps.apk_info.outputs.commit_message }}"
          COMMIT_AUTHOR="${{ steps.apk_info.outputs.commit_author }}"
          AUTHOR_URL="https://github.com/${{ github.actor }}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/$COMMIT_SHA"
          
          # Extract VirusTotal scan URL (output format from the action is "filename=URL")
          VT_URL=$(echo "$VT_ANALYSIS" | cut -d'=' -f2-)
          
          # Properly formatted Telegram HTML message
          MESSAGE=$(printf "<b>New Beta Release</b>\n\nA new signed beta APK is ready and has passed the VirusTotal scan!\n\n<b>Commit:</b> <a href=\"%s\">%s</a>\n<b>Message:</b> %s\n\n<b>Author:</b> <a href=\"%s\">%s</a>\n<b>VirusTotal Check:</b> <a href=\"%s\">View Full Scan Results</a>\n\n<i>Built with GitHub Actions on %s</i>" "$COMMIT_URL" "${COMMIT_SHA:0:7}" "$COMMIT_MESSAGE" "$AUTHOR_URL" "$COMMIT_AUTHOR" "$VT_URL" "$(date -u +'%Y-%m-%d %H:%M:%S UTC')")
          
          # Send message with file using hardcoded Chat ID and Topic ID
          curl -X POST \
            -F chat_id="-1002199979475" \
            -F message_thread_id="437" \
            -F "document=@$APK_PATH" \
            --form-string "caption=$MESSAGE" \
            -F "parse_mode=HTML" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument"

      - name: Upload Signed Fdroid Release APK
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-release-apk
          path: ${{ steps.sign_app_fdroid.outputs.signedReleaseFile }}
